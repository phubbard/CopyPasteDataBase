name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed for auto-generated release notes to see prior tags

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          # Build artefacts (signed .app) aren't attached here — producing a
          # notarised signed build in CI would need the signing cert + notary
          # credentials as secrets, which is future work. For now the README
          # has clear `make install-app` instructions to build from source.
          body: |
            Build from source:

            ```sh
            git clone git@github.com:phubbard/CopyPasteDataBase.git cpdb
            cd cpdb
            git checkout ${{ github.ref_name }}
            make install-app
            open -a cpdb
            ```
