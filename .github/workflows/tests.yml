name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: swift test
    runs-on: macos-15

    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Show toolchain
        # GitHub's macos-15 runners ship with Xcode preinstalled and
        # xcode-select already pointing at it — that gives us swift-testing
        # (Testing.framework) and the #Preview macro plugin that
        # KeyboardShortcuts needs. No custom xcode-select required.
        run: |
          xcodebuild -version
          swift --version

      - name: Build
        run: swift build

      - name: Run tests
        # Three Paste.db-fixture tests (`.enabled(if: pasteInstalled)`) skip
        # cleanly on CI because the real Paste database isn't present —
        # that's expected and not a failure.
        run: swift test

      # Universal binary build, gated on each main / PR push. Catches
      # arch-specific regressions (arm64-only intrinsics, x86_64-only
      # SIMD, etc.) before they reach a release. Builds CLI only —
      # the menu-bar app needs CpdbApp's full bundle dance which is
      # out of scope for the fast-feedback CI lane. The release
      # workflow handles the full bundled artefact.
      #
      # Note: `swift build --arch arm64 --arch x86_64` exits non-zero
      # on success on some macos-15 runner toolchains (driver bug;
      # build itself completes and the universal binary lands at the
      # expected path). We capture the exit code, then derive
      # success from "binary exists with both slices" instead. The
      # exit-code path becomes advisory.
      - name: Universal build (arm64 + x86_64)
        run: |
          set +e
          swift build -c release --arch arm64 --arch x86_64 --product cpdb-cli
          swift_exit=$?
          set -e
          BIN=.build/apple/Products/Release/cpdb-cli
          if [ ! -f "$BIN" ]; then
            echo "::error::swift build did not produce $BIN (exit $swift_exit)"
            exit 1
          fi
          if [ "$swift_exit" -ne 0 ]; then
            echo "::warning::swift build exited $swift_exit, but $BIN exists — treating as success"
          fi
          echo "lipo -archs:"
          lipo -archs "$BIN"
          # Hard-fail if either slice is missing.
          ARCHS=$(lipo -archs "$BIN")
          for a in arm64 x86_64; do
            if ! echo "$ARCHS" | tr ' ' '\n' | grep -qx "$a"; then
              echo "::error::missing $a slice in cpdb-cli (got: $ARCHS)"
              exit 1
            fi
          done
